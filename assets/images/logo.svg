<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891B2"/>
      <stop offset="100%" style="stop-color:#164E63"/>
    </linearGradient>
  </defs>
  
  <!-- Icon - Medical Cross with Circle -->
  <g transform="translate(5, 5)">
    <!-- Outer circle arc -->
    <path d="M 20 2 A 18 18 0 1 1 20 38 A 18 18 0 1 1 20 2" 
          fill="none" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Stethoscope style curve -->
    <path d="M 8 20 Q 2 20 2 14 Q 2 8 8 8" 
          fill="none" stroke="#0891B2" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Medical cross -->
    <rect x="16" y="12" width="8" height="16" rx="1" fill="url(#logoGradient)"/>
    <rect x="12" y="16" width="16" height="8" rx="1" fill="url(#logoGradient)"/>
  </g>
  
  <!-- Text: MEDICQ -->
  <text x="52" y="32" font-family="Arial, sans-serif" font-size="26" font-weight="700">
    <tspan fill="#164E63">MEDIC</tspan><tspan fill="#0891B2">Q</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="52" y="45" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" letter-spacing="1">
    MEDICAL APPOINTMENT
  </text>
</svg>
